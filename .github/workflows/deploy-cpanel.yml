name: Deploy WordPress to cPanel

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-${{ github.ref }}
  cancel-in-progress: true

env:
  THEME_SLUG: liga-basket-chile

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.CPANEL_SSH_PORT }}" "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify staging WordPress path
        env:
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_PATH: ${{ secrets.CPANEL_STAGING_PATH }}
        run: |
          set -euo pipefail
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "test -f '${REMOTE_PATH}/wp-config.php' && mkdir -p '${REMOTE_PATH}/wp-content/themes/${THEME_SLUG}'"

      - name: Deploy theme to staging
        env:
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_PATH: ${{ secrets.CPANEL_STAGING_PATH }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".DS_Store" \
            -e "ssh -p ${SSH_PORT}" \
            "./wp-content/themes/${THEME_SLUG}/" \
            "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}/wp-content/themes/${THEME_SLUG}/"

      - name: Run post-deploy commands on staging
        env:
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_PATH: ${{ secrets.CPANEL_STAGING_PATH }}
        run: |
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "cd '${REMOTE_PATH}'; if command -v wp >/dev/null 2>&1; then wp cache flush --path='${REMOTE_PATH}' || true; elif [ -f wp-cli.phar ]; then php wp-cli.phar cache flush --path='${REMOTE_PATH}' || true; fi"

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.CPANEL_SSH_PORT }}" "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify production WordPress path
        env:
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_PATH: ${{ secrets.CPANEL_PROD_PATH }}
        run: |
          set -euo pipefail
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "test -f '${REMOTE_PATH}/wp-config.php' && mkdir -p '${REMOTE_PATH}/wp-content/themes/${THEME_SLUG}'"

      - name: Deploy theme to production
        env:
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_PATH: ${{ secrets.CPANEL_PROD_PATH }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".DS_Store" \
            -e "ssh -p ${SSH_PORT}" \
            "./wp-content/themes/${THEME_SLUG}/" \
            "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}/wp-content/themes/${THEME_SLUG}/"

      - name: Run post-deploy commands on production
        env:
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_PATH: ${{ secrets.CPANEL_PROD_PATH }}
        run: |
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "cd '${REMOTE_PATH}'; if command -v wp >/dev/null 2>&1; then wp cache flush --path='${REMOTE_PATH}' || true; elif [ -f wp-cli.phar ]; then php wp-cli.phar cache flush --path='${REMOTE_PATH}' || true; fi"
